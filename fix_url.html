<!DOCTYPE html>
<html>
<head>
    <title>Fix Profile Image URL</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <h1>Fix Corrupted Profile Image URL</h1>
    <button onclick="fixUrl()" style="padding: 20px; font-size: 18px; background: #7C4DFF; color: white; border: none; border-radius: 8px; cursor: pointer;">
        Fix URL Now
    </button>
    <pre id="log" style="background: #f5f5f5; padding: 20px; margin-top: 20px;"></pre>

    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBynThldSGo2kKSiOdfOxJgIL05hpEp-NQ",
            authDomain: "facconsult-19071.firebaseapp.com",
            projectId: "facconsult-19071",
            storageBucket: "facconsult-19071.firebasestorage.app",
            messagingSenderId: "506544538251",
            appId: "1:506544538251:web:0d9b0ed2e4f7e5c5b3e5e5"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function log(message) {
            const logEl = document.getElementById('log');
            logEl.textContent += message + '\n';
            console.log(message);
        }

        async function fixUrl() {
            try {
                log('🔍 Reading faculty document...');
                const docRef = db.collection('faculty').doc('xgTtxN8qpITHCBq21OWv');
                const doc = await docRef.get();
                
                if (!doc.exists) {
                    log('❌ Document does not exist!');
                    return;
                }
                
                const data = doc.data();
                const currentUrl = data.profile_image_url;
                
                log(`📊 Current URL length: ${currentUrl.length}`);
                log(`📊 Current URL: "${currentUrl}"`);
                
                // Remove ALL whitespace
                const fixedUrl = currentUrl.replace(/\s+/g, '');
                
                log(`📊 Fixed URL length: ${fixedUrl.length}`);
                log(`📊 Fixed URL: "${fixedUrl}"`);
                
                if (fixedUrl !== currentUrl) {
                    log('🔧 URLs are different! Updating database...');
                    await docRef.update({ profile_image_url: fixedUrl });
                    log('✅ URL FIXED in database!');
                    log('✅ Refresh your Flutter app now!');
                } else {
                    log('✅ URL is already clean!');
                }
            } catch (e) {
                log(`❌ Error: ${e.message}`);
            }
        }
    </script>
</body>
</html>
